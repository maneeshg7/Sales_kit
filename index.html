<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Leyland Sales Executive Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .folder { cursor: pointer; padding: 10px; border: 1px solid #ddd; margin: 5px; }
        .content { display: none; margin-left: 20px; }
        .link { display: block; padding: 5px; margin: 2px 0; color: blue; text-decoration: none; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Ashok Leyland Sales Executive Portal</h1>
    <div class="folder" onclick="toggleFolder('sales')">Sales</div>
    <div class="content" id="sales">
        <div class="folder" onclick="toggleFolder('leads')">Leads</div>
        <div class="content" id="leads">
            <a href="leads/list.pdf" class="link">View Leads List</a>
            <a href="leads/guidelines.pdf" class="link">Leads Guidelines</a>
        </div>
        <div class="folder" onclick="toggleFolder('reports')">Reports</div>
        <div class="content" id="reports">
            <a href="reports/monthly_report.pdf" class="link">Monthly Report</a>
            <a href="reports/annual_report.pdf" class="link">Annual Report</a>
        </div>
    </div>
    <script>
        function toggleFolder(id) {
            var content = document.getElementById(id);
            if (content.style.display === "none" || content.style.display === "") {
                content.style.display = "block";
            } else {
                content.style.display = "none";
            }
        }
    </script>
</body>
</html>
